name: un-isolate
options:
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.unisolate.app
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    INFOPLIST_FILE: Config/Info.plist
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
packages: {}
targets:
  UnIsolate:
    type: application
    platform: iOS
    sources:
      - path: UnIsolate
        excludes:
          - Resources/Preview Content/**
    resources:
      - UnIsolate/Resources
    settings:
      base:
        PRODUCT_NAME: un-isolate
        TARGETED_DEVICE_FAMILY: 1
        DEVELOPMENT_ASSET_PATHS: "\"UnIsolate/Resources/Preview Content\""
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets: []
